name: Build L2 Tribe Launcher

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build single-file launcher
        shell: pwsh
        run: ./build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: l2-tribe-launcher
          path: build/win-x64/*
          if-no-files-found: error
